<!DOCTYPE html>
<html lang="en">
<head>
    
<style>
body{background:#111;color:white;font-family:sans-serif;text-align:center;margin-top:80px}
.player{width:320px;margin:auto}
img{width:100%;border-radius:10px}
button{margin:6px;padding:8px 14px}
</style>
</head>

<body>

<div class="player">
<img id="art">
<h2 id="title"></h2>
<p id="artist"></p>

<audio id="audio"></audio>

<button onclick="prev()">◀</button>
<button onclick="play()">▶</button>
<button onclick="next()">▶▶</button>
<button onclick="shuffle()">🔀</button>
</div>

<script>

let tracks=[]
let i=0
const audio=document.getElementById("audio")

fetch(/js/tracks.json")
.then(r=>r.json())
.then(data=>{
tracks=data
load(0)
})

function load(n){
i=n
audio.src=tracks[i].src
title.textContent=tracks[i].title
artist.textContent=tracks[i].artist
art.src=tracks[i].art
}

function play(){audio.paused?audio.play():audio.pause()}
function next(){load((i+1)%tracks.length);audio.play()}
function prev(){load((i-1+tracks.length)%tracks.length);audio.play()}
function shuffle(){load(Math.floor(Math.random()*tracks.length));audio.play()}

audio.onended=shuffle

</script>
</body>
</html>
